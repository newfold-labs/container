name: Trigger Satis Build

on:
  release:
    types:
      - created

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  webhook:
    name: Send Webhook
    runs-on: ubuntu-latest
    permissions: {} # No GITHUB_TOKEN access required; the dispatch uses a separate WEBHOOK_TOKEN secret.
    steps:

      - name: Set Package
        id: package
        env:
          REPO: ${{ github.repository }}
        run: echo ::set-output name=PACKAGE::${REPO##*/}

      - name: Set Version
        id: tag
        run: echo ::set-output name=VERSION::${GITHUB_REF##*/}

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.WEBHOOK_TOKEN }}
          repository: newfold-labs/satis
          event-type: 'satis-build'
          client-payload: >-
            {
              "vendor": "${{ github.repository_owner }}",
              "package": "${{ steps.package.outputs.PACKAGE }}",
              "version": "${{ steps.tag.outputs.VERSION }}"
            }
